<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas - Flylena</title>
    <script src="https://kit.fontawesome.com/c4d24c071d.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="../../estilos_navbar_&_footer.css" rel="stylesheet">
    <link href="./styles.css" rel="stylesheet">
    <script src="../../navbar.js" defer></script>
    <script src="../../footer.js" defer></script>
    <script src="./ofertas.js" defer></script>
</head>

<body>

    <header class="fl-header">
        <nav class="fl-nav">
            <button class="hamburger-btn" id="hamburger-btn" aria-label="Abrir menú">
                <i class="fa-solid fa-bars"></i>
            </button>
            <a class="logo" href="../../index.html">
                <img src="../../img/fly_lena_logo_chico.png" alt="logoFlyLena">
            </a>
            <ul id="nav-links"></ul>
            <div class="user-nav-container" id="user-container"></div>
        </nav>
    </header>

    <main class="mainOfertas">

        <section class="heroOfertas">
            <div class="contenedorHeroOfertas">
                <div class="textoHero">
                    <h1>Ofertas Destacadas</h1>
                    <p>Encontrá vuelos promocionales a destinos increíbles.</p>
                </div>
                <img class="avionHero" src="../../img/imagenOfertas.png" alt="">
            </div>
        </section>

        <section class="seccionCardsOfertas" id="contenedorOfertas"></section>

    </main>

    <footer id="contacto-footer" class="footer-custom"></footer>

</body>

</html>
